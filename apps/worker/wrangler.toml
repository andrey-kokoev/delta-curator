name = "delta-curator"
main = "src/index.ts"
compatibility_date = "2025-12-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "delta-curator"
database_id = "c60bfd61-050d-46bc-9e57-002c73bf1dfe"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "delta-curator-artifacts"

# Static assets using Workers Sites (more stable)
[site]
bucket = "../ui/dist"

# Session KV (optional, can use D1 instead)
[[kv_namespaces]]
binding = "SESSIONS"
id = "your-sessions-kv-namespace-id"

[ai]
binding = "AI"

# AI Search not yet GA; placeholder for future integration
# [[vectorize]]
# binding = "AI_SEARCH"
# index = "delta-curator-idx"

[triggers]
crons = ["0 8 * * *"]

# Required secrets (set via wrangler secret put):
# - AUTH_SECRET: Random string for session signing
# - AUTH_MICROSOFT_CLIENT_ID: Azure AD app client ID
# - AUTH_MICROSOFT_CLIENT_SECRET: Azure AD app client secret
# - AUTH_MICROSOFT_TENANT_ID: Azure AD tenant ID (or 'common')
